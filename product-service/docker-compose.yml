services:
  mysql:
    image: mysql:8
    container_name: mysql-product
    environment:
      MYSQL_ROOT_PASSWORD: Test@123
      MYSQL_DATABASE: productdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - product-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pTest@123"]
      timeout: 20s
      retries: 10

volumes:
  mysql-data:

networks:
  product-network:
    driver: bridge