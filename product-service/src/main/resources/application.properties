server.port=8082
spring.application.name=PRODUCT-MICROSERVICE
spring.cloud.compatibility-verifier.enabled=false

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/productdb
spring.datasource.username=root
spring.datasource.password=Test@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Eureka Client
eureka.client.service-url.default-zone=http://localhost:8761/eureka

# RABBITMQ CONNECTION
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# --- EXCHANGE ---
rabbitmq.order.exchange=order.exchange
# Added this to fix your bean creation error:
rabbitmq.product.exchange=order.exchange 

# --- ROUTING KEYS ---
rabbitmq.order.routing.created=order.created
rabbitmq.order.routing.cancelled=order.cancelled
# Added this for the Payment Service to listen to:
rabbitmq.product.routing.deducted=stock.deducted

# --- QUEUES ---
rabbitmq.queue.order-created=order.created.queue
rabbitmq.queue.order-cancelled=order.cancelled.queue
rabbitmq.queue.stock-deducted=stock.deducted.queue