spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb

# Use a random free port to avoid conflicts during local dev
server.port=8081
spring.datasource.username=postgres
spring.datasource.password=Test@123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.application.name=ORDER-MICROSERVICE
spring.cloud.compatibility-verifier.enabled=false


# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.instance.hostname=localhost
eureka.client.service-url.default-zone=http://localhost:8761/eureka



# RABBITMQ CONFIG
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ORDER SERVICE EXCHANGE
rabbitmq.order.exchange=order.exchange

# ROUTING KEYS
rabbitmq.order.routing.created=order.created
rabbitmq.order.routing.updated=order.updated
rabbitmq.order.routing.deleted=order.deleted

## ORDER QUEUES
rabbitmq.queue.order-created=order.created.queue
rabbitmq.queue.order-updated=order.updated.queue
rabbitmq.queue.order-deleted=order.deleted.queue


# NEW: Saga Orchestration Queues
rabbitmq.queue.payment-success=payment.success.queue
rabbitmq.queue.order-cancelled=order.cancelled.order-service.queue

# NEW: Saga Routing Keys (Must match Payment Service)
rabbitmq.order.routing.success=payment.success
rabbitmq.order.routing.cancelled=order.cancelled